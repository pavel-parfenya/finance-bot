name: Build & Deploy

# Сборка 6 образов (api/bot/cms/landing/miniapp/migrate) на GitHub-раннерах →
# пуш в GHCR → деплой на VPS по SSH (pull + миграции + up). На сервере НЕ собираем.
on:
  push:
    # development — текущая рабочая/деплой-ветка. main добавлять, когда появится разделение сред.
    branches: [development]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }} # ghcr.io/<owner>/<repo>-<service>

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, bot, cms, landing, miniapp, migrate]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          # gha-кэш переиспользует слои между прогонами CI.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Build-args инлайнятся в landing (Next.js) и miniapp (Nuxt) при сборке.
          # Значения берутся из Repository Variables (Settings → Secrets and variables → Actions → Variables).
          build-args: |
            STRAPI_API_URL=http://cms:1337
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.finance-bot.by' }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL || 'https://finance-bot.by' }}
            NEXT_PUBLIC_BOT_USERNAME=${{ vars.NEXT_PUBLIC_BOT_USERNAME }}
            PAYMENT_MODE=${{ vars.PAYMENT_MODE || 'paid' }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # TAG пиннит ВСЕ образы на коммит этого релиза — атомарный откат по sha.
          script: |
            set -e
            export TAG="${{ github.sha }}"
            cd /opt/finance-bot
            git pull --ff-only                # обновить docker-compose.prod.yml и deploy/nginx
            docker compose -f docker-compose.prod.yml pull
            # поднять БД и дождаться healthy (healthcheck знает DB_USER из .env)
            docker compose -f docker-compose.prod.yml up -d --wait postgres
            # миграции ДО старта приложений; падение здесь обрывает деплой
            docker compose -f docker-compose.prod.yml run --rm migrate
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
