name: Build & Deploy

# Сборка 5 образов (api/bot/cms/landing/miniapp) на GitHub-раннерах → пуш в GHCR →
# деплой на VPS по SSH (pull + миграции + up). На сервере НЕ собираем.
# (migrate-образа нет — миграции гоняет образ api.)
on:
  push:
    # development — текущая рабочая/деплой-ветка. main добавлять, когда появится разделение сред.
    branches: [development]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }} # ghcr.io/<owner>/<repo>-<service>

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # migrate-образа нет: миграции гоняет образ api (скомпилированный прод-раннер).
        service: [api, bot, cms, landing, miniapp]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          # gha-кэш переиспользует слои между прогонами CI.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Build-args инлайнятся в landing (Next.js) и miniapp (Nuxt) при сборке.
          # Значения берутся из Repository Variables (Settings → Secrets and variables → Actions → Variables).
          build-args: |
            STRAPI_API_URL=http://cms:1337
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.finance-bot.by' }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL || 'https://finance-bot.by' }}
            NEXT_PUBLIC_BOT_USERNAME=${{ vars.NEXT_PUBLIC_BOT_USERNAME }}
            PAYMENT_MODE=${{ vars.PAYMENT_MODE || 'paid' }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Дефолт ssh-action = 10m, чего мало для первого pull тяжёлых образов на
          # слабом VPS с медленным каналом. Даём запас (последующие pull быстрые — слои кэшируются).
          command_timeout: 40m
          # TAG пиннит ВСЕ образы на коммит этого релиза — атомарный откат по sha.
          #
          # Деплой устойчив к двум прежним падениям (см. историю инцидентов):
          #  1) ENOSPC: диск VPS 9.8ГБ не вмещает старый+новый набор образов сразу,
          #     а `docker compose pull` тянул все 5 разом (старые ещё in-use) →
          #     переполнение на тяжёлом слое CMS. Решение — switch-then-prune:
          #     лёгкие сервисы (pull→пересоздать→prune освобождает их старые образы),
          #     затем CMS уже с запасом места.
          #  2) postgres:16-alpine из Docker Hub: bare-pull дёргал флапающий
          #     auth.docker.io (404 на токене). postgres уже есть на диске и почти
          #     не меняется — его НЕ пуллим вовсе (pull только образов из GHCR).
          script: |
            set -e
            export TAG="${{ github.sha }}"
            cd /opt/finance-bot
            git pull --ff-only                # обновить docker-compose.prod.yml и deploy/nginx
            dc() { docker compose -f docker-compose.prod.yml "$@"; }
            # pull с ретраями — гасит транзиентные сбои реестра (GHCR/сеть).
            pull_retry() {
              for i in 1 2 3; do
                dc pull "$@" && return 0
                echo "pull '$*' не удался (попытка $i/3), повтор через 10с..."; sleep 10
              done
              return 1
            }
            # убрать неиспользуемые образы старых sha ДО pull (in-use не трогаются)
            docker image prune -af

            # 1) Лёгкие сервисы (GHCR) + миграции. postgres НЕ пуллим — образ на
            #    диске; `up` тянет только отсутствующее, так что Docker Hub не дёргаем.
            pull_retry api bot landing miniapp
            dc up -d --wait postgres                       # ждём healthy (DB_USER из .env)
            dc run --rm migrate                            # миграции ДО старта приложений
            dc up -d --no-deps api bot landing miniapp     # пересоздать на новых образах
            docker image prune -af                         # освободить их старые образы → место под CMS

            # 2) Тяжёлый CMS — теперь с высвободившимся местом.
            pull_retry cms
            dc up -d --no-deps cms
            docker image prune -af

            # финальная сходимость (идемпотентно, без pull — образы на месте)
            dc up -d
            docker image prune -f
