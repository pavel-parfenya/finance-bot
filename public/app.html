<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Мои расходы</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      background: var(--tg-theme-bg-color, #f4f4f5);
      color: var(--tg-theme-text-color, #1c1e21);
      min-height: 100vh;
    }
    h1 { font-size: 1.15rem; margin: 0 0 12px; font-weight: 600; }
    p { margin: 0 0 12px; color: var(--tg-theme-hint-color, #65676b); }
    code {
      display: block;
      padding: 12px 14px;
      margin-top: 8px;
      border-radius: 8px;
      font-size: 13px;
      word-break: break-all;
      background: var(--tg-theme-secondary-bg-color, #e8e8ea);
      color: var(--tg-theme-text-color, #1c1e21);
    }
  </style>
</head>
<body>
  <h1>Mini App не собран</h1>
  <script>
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) { tg.ready(); tg.expand(); }
    })();
  </script>
</body>
</html>
