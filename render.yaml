services:
  - type: web
    name: finance-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MODE
        value: webhook
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: WHISPER_API_KEY
        sync: false
      - key: WHISPER_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_WORKSHEET_NAME
        value: Расходы
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
