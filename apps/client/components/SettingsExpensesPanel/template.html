<div class="settings-expenses">
  <section class="settings-panel">
    <h3 class="settings-panel-title">Валюта по умолчанию</h3>
    <select
      id="default-currency"
      v-model="defaultCurrency"
      class="select-styled"
      @change="onCurrencyChange"
    >
      <option value="">Не задана</option>
      <option v-for="c in CURRENCIES" :key="c" :value="c">{{ c }}</option>
    </select>
    <p class="settings-hint">
      Используется при редактировании записей и новых тратах
    </p>
  </section>

  <section class="settings-panel">
    <h3 class="settings-panel-title">Свои категории</h3>
    <p class="settings-hint settings-hint--below-title">
      Бот будет использовать эти категории при анализе расходов
    </p>

    <div class="categories-tiles">
      <button
        v-if="!showAddForm"
        type="button"
        class="cat-tile cat-tile--add"
        @click="showAddForm = true"
      >
        <span class="cat-tile-add-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </span>
        <span class="cat-tile-add-text">Добавить категорию</span>
      </button>

      <div v-else class="cat-tile cat-tile--add cat-tile--form">
        <div class="cat-form cat-form--new">
          <input
            v-model="newCatName"
            type="text"
            class="cat-input"
            placeholder="Название"
            @keyup.enter="addCategory"
          />
          <input
            v-model="newCatDesc"
            type="text"
            class="cat-input"
            placeholder="Описание (что сюда относится)"
            @keyup.enter="addCategory"
          />
          <div class="cat-form-actions">
            <button
              type="button"
              class="btn-cat-save"
              :disabled="addLoading || !newCatName.trim()"
              @click="addCategory"
            >
              Добавить
            </button>
            <button
              type="button"
              class="btn-cat-cancel"
              @click="showAddForm = false; newCatName = ''; newCatDesc = ''"
            >
              Отмена
            </button>
          </div>
        </div>
      </div>

      <div
        v-for="cat in categories"
        :key="cat.id"
        class="cat-tile cat-tile--category"
        :class="{ 'cat-tile--editing': editingId === cat.id }"
      >
        <template v-if="editingId === cat.id">
          <div class="cat-form cat-form--edit">
            <input
              v-model="editName"
              type="text"
              class="cat-input"
              placeholder="Название"
              @keyup.enter="saveEdit"
            />
            <input
              v-model="editDesc"
              type="text"
              class="cat-input"
              placeholder="Описание"
              @keyup.enter="saveEdit"
            />
            <div class="cat-form-actions">
              <button
                type="button"
                class="btn-cat-save"
                :disabled="editLoading || !editName.trim()"
                @click="saveEdit"
              >
                Сохранить
              </button>
              <button
                type="button"
                class="btn-cat-cancel"
                @click="cancelEdit"
              >
                Отмена
              </button>
            </div>
          </div>
        </template>
        <template v-else>
          <div class="cat-tile-body">
            <div class="cat-info">
              <span class="cat-name">{{ cat.name }}</span>
              <span v-if="cat.description" class="cat-desc">{{ cat.description }}</span>
              <span v-if="cat.createdByUsername" class="cat-author">@{{ cat.createdByUsername }}</span>
            </div>
            <div v-if="canEditCategory(cat)" class="cat-actions">
              <button type="button" class="btn-cat-icon" title="Редактировать" @click="startEdit(cat)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
              </button>
              <button type="button" class="btn-cat-icon btn-cat-delete" title="Удалить" @click="removeCategory(cat.id)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </section>
</div>
