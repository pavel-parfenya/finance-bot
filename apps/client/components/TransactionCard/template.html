<div class="card" :data-id="transaction.id">
  <div class="card-main">
    <div class="card-desc">{{ transaction.description || '' }}</div>
    <div class="card-meta">
      {{ formatDate(transaction.date) }} {{ formatTime(transaction.date) }}
    </div>
    <div v-if="transaction.category" class="card-category">{{ transaction.category }}</div>
    <div v-if="showPerson && transaction.personDisplayName" class="card-person">
      {{ transaction.personDisplayName }}
    </div>
  </div>
  <div class="card-actions">
    <span class="card-amount">
      {{ transaction.amount }}
      <span v-if="transaction.currency" class="currency">
        {{ transaction.currency }}
      </span>
    </span>
    <button
      type="button"
      class="btn-edit"
      title="Изменить"
      @click="emit('edit', transaction)"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
        />
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
      </svg>
    </button>
    <button
      type="button"
      class="btn-del"
      title="Удалить"
      @click="emit('delete', transaction)"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="3 6 5 6 21 6" />
        <path
          d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
        />
        <line x1="10" y1="11" x2="10" y2="17" />
        <line x1="14" y1="11" x2="14" y2="17" />
      </svg>
    </button>
  </div>
</div>
