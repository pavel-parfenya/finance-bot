<div v-if="open" class="modal-overlay" @click.self="emit('close')">
  <div class="modal">
    <div class="modal-header">
      <h3>Как пользоваться</h3>
      <button
        type="button"
        class="btn-close"
        title="Закрыть"
        @click="emit('close')"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <HelpInfoContent />
  </div>
</div>
