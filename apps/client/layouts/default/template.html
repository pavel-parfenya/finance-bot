<div class="app">
  <header class="header">
    <div class="header-title-wrap">
      <NuxtLink
        v-if="showSettingsBack"
        to="/settings"
        class="header-back"
        aria-label="Назад к настройкам"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </NuxtLink>
      <h1 class="header-title">{{ pageTitle }}</h1>
    </div>
    <div class="header-actions">
      <button
        v-if="activeTab === 'table' || activeTab === 'analytics'"
        type="button"
        class="btn-header-icon"
        title="Участники"
        @click="membersOpen = true"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <line x1="23" y1="11" x2="17" y2="11" />
          <line x1="20" y1="8" x2="20" y2="14" />
        </svg>
        <span v-if="otherMembersCount > 0" class="header-badge">
          {{ otherMembersCount }}
        </span>
      </button>
      <button
        type="button"
        class="btn-header-icon"
        title="Справка"
        @click="openInfo"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
        <span v-if="showInfoBadge" class="header-badge-dot" />
      </button>
      <NuxtLink
        v-if="isSettingsRoute"
        to="/table"
        class="btn-header-icon btn-header-close"
        title="Закрыть настройки"
        aria-label="Закрыть настройки"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </NuxtLink>
      <NuxtLink
        v-else
        to="/settings"
        class="btn-header-icon"
        title="Настройки"
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
      </NuxtLink>
    </div>
  </header>

  <div v-if="!isSettingsRoute" class="nav-row">
    <button
      v-if="activeTab === 'table'"
      type="button"
      class="btn-filters"
      :class="{ active: filtersOpen }"
      title="Фильтры"
      @click="filtersOpen = !filtersOpen"
    >
      <svg class="btn-filters-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
      </svg>
      <span v-if="activeFiltersCount > 0" class="btn-filters-badge">
        {{ activeFiltersCount }}
      </span>
    </button>

    <nav class="tabs-row">
      <NuxtLink to="/table" :class="['tab', { active: activeTab === 'table' }]">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
        <span class="tab-label">Траты</span>
      </NuxtLink>

      <NuxtLink to="/analytics" :class="['tab', { active: activeTab === 'analytics' }]">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        <span class="tab-label">Аналитика</span>
      </NuxtLink>

      <NuxtLink to="/debts" :class="['tab', { active: activeTab === 'debts' }]">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23" />
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        <span class="tab-label">Долги</span>
      </NuxtLink>
    </nav>
  </div>

  <main class="content">
    <slot />
  </main>

  <MembersModal
    :open="membersOpen"
    @close="membersOpen = false"
    @members-changed="onMembersChanged"
  />

  <InfoModal
    :open="infoOpen"
    @close="infoOpen = false"
  />
</div>
