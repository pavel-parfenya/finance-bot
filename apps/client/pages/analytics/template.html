<div>
  <div class="analytics-controls">
    <select
      v-model="period"
      @change="period === 'period' && setDefaultPeriod()"
    >
      <option value="current">Текущий месяц</option>
      <option value="prev">Предыдущий месяц</option>
      <option value="period">Период</option>
    </select>
    <div v-show="showPeriodDates()" class="period-dates">
      <input v-model="startDate" type="date" placeholder="Начало" />
      <input v-model="endDate" type="date" placeholder="Конец" />
    </div>
    <div v-if="showPersonFilter()" class="filter-group">
      <label class="filter-label">Участник</label>
      <select v-model="userIdFilter" class="filter-select">
        <option value="">Все</option>
        <option v-for="m in members" :key="m.userId" :value="String(m.userId)">
          {{ m.username ? `@${m.username}` : `Участник #${m.userId}` }}
        </option>
      </select>
    </div>
  </div>
  <div v-if="loading" class="loading">Загрузка...</div>
  <div v-else-if="error" class="error">{{ error }}</div>
  <div v-else-if="byCategory.length === 0" class="empty">
    Нет трат за выбранный период
  </div>
  <div v-else>
    <div class="summary-card">
      <div v-if="hasIncome" class="summary-grid">
        <div class="summary-cell summary-item-expense" title="Расходы">
          <svg class="summary-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 18 13.5 8.5 8.5 13.5 1 6" />
            <polyline points="17 18 23 18 23 12" />
          </svg>
          <span class="summary-value">{{ totalExpenseInDefault }} {{ defaultCurrency }}</span>
        </div>
        <div class="summary-cell summary-item-income" title="Доходы">
          <svg class="summary-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
            <polyline points="17 6 23 6 23 12" />
          </svg>
          <span class="summary-value">{{ totalIncomeInDefault }} {{ defaultCurrency }}</span>
        </div>
        <div class="summary-cell summary-item-balance" title="Баланс">
          <svg class="summary-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
            <line x1="1" y1="10" x2="23" y2="10" />
            <path d="M12 15h4" />
          </svg>
          <span class="summary-value">{{ totalInDefault }} {{ defaultCurrency }}</span>
        </div>
      </div>
      <div v-else class="summary-row">
        <span class="summary-total">Итого: {{ totalInDefault }} {{ defaultCurrency }}</span>
      </div>
      <div v-if="hasIncome" class="income-bar-wrap">
        <div class="income-bar">
          <div
            class="income-bar-segment income-bar-expenses"
            :style="{ width: expensesPercent + '%' }"
          />
          <div
            class="income-bar-segment income-bar-balance"
            :style="{ width: balancePercent + '%' }"
          />
        </div>
      </div>
    </div>
    <AnalyticsChart
      v-if="chartItems.length > 0"
      :items="chartItems"
      :format-as-percent="chartFormatAsPercent"
      interactive
      @segment-click="onChartSegment"
    />
    <div class="category-list">
      <template v-for="c in chartCategoryList" :key="c.category">
        <NuxtLink
          v-if="c.category !== REMAINDER_LABEL"
          class="category-row category-row--link"
          :to="tableLinkForCategory(c.category)"
          title="Траты по категории с выбранным периодом и участником"
        >
          <span class="category-row-name">
            <svg
              class="category-row-detail-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="9" />
              <path d="M10 15l3-3-3-3" />
            </svg>
            <span class="category-row-title-text">{{ c.category }}</span>
          </span>
          <span class="category-row-value">
            {{
              c.percent
                ? c.percent + " (" + c.amount + " " + defaultCurrency + ")"
                : c.amount + " " + defaultCurrency
            }}
          </span>
        </NuxtLink>
        <div v-else class="category-row category-row--static">
          <span class="category-row-name">{{ c.category }}</span>
          <span class="category-row-value">
            {{
              c.percent
                ? c.percent + " (" + c.amount + " " + defaultCurrency + ")"
                : c.amount + " " + defaultCurrency
            }}
          </span>
        </div>
      </template>
    </div>
  </div>
</div>
