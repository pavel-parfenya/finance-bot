<div class="sub-panel">
  <p v-if="loading" class="sub-hint">Загрузка…</p>

  <p v-else-if="error" class="sub-error">{{ error }}</p>

  <template v-else>
    <div class="sub-current">
      <div>
        <p class="sub-current-label">Текущий тариф</p>
        <p class="sub-current-plan">
          {{ currentPlanLabel }}
          <span class="sub-current-status">· {{ currentStatusLabel }}</span>
        </p>
      </div>
      <div v-if="expiresLabel" class="sub-current-expires">
        <p class="sub-current-label">Действует до</p>
        <p class="sub-current-plan">{{ expiresLabel }}</p>
      </div>
    </div>

    <div v-if="currentFeatures.length" class="sub-features">
      <p class="sub-current-label">Доступно в вашем тарифе</p>
      <ul class="sub-features-list">
        <li v-for="f in currentFeatures" :key="f.key" class="sub-feature">
          <span class="sub-feature-mark">✓</span>
          {{ f.label }}
        </li>
      </ul>
    </div>

    <button
      class="sub-plan-cta"
      type="button"
      :disabled="checkoutLoading"
      @click="changePlan"
    >
      {{ checkoutLoading ? 'Открываем…' : 'Сменить план' }}
    </button>

    <p v-if="checkoutError" class="sub-error">{{ checkoutError }}</p>
  </template>
</div>
