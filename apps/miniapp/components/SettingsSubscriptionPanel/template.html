<div class="sub-panel">
  <p v-if="loading" class="sub-hint">Загрузка…</p>

  <p v-else-if="error" class="sub-error">{{ error }}</p>

  <template v-else>
    <div class="sub-current">
      <div>
        <p class="sub-current-label">Текущий тариф</p>
        <p class="sub-current-plan">
          {{ currentPlanLabel }}
          <span class="sub-current-status">· {{ currentStatusLabel }}</span>
        </p>
      </div>
      <div v-if="expiresLabel" class="sub-current-expires">
        <p class="sub-current-label">Действует до</p>
        <p class="sub-current-plan">{{ expiresLabel }}</p>
      </div>
    </div>

    <div v-if="currentFeatures.length" class="sub-features">
      <p class="sub-current-label">Доступно в вашем тарифе</p>
      <ul class="sub-features-list">
        <li v-for="f in currentFeatures" :key="f.key" class="sub-feature">
          <span class="sub-feature-mark">✓</span>
          {{ f.label }}
        </li>
      </ul>
    </div>

    <button
      class="sub-plan-cta"
      type="button"
      :disabled="checkoutLoading"
      @click="changePlan"
    >
      {{ checkoutLoading ? 'Открываем…' : 'Сменить план' }}
    </button>

    <p v-if="checkoutError" class="sub-error">{{ checkoutError }}</p>

    <template v-if="canCancel">
      <button
        v-if="!cancelConfirm"
        class="sub-cancel-link"
        type="button"
        @click="askCancel"
      >
        Отменить подписку
      </button>

      <div v-else class="sub-cancel-confirm">
        <p class="sub-cancel-note">
          Автопродление остановится, а доступ к платным функциям сохранится
          до конца оплаченного периода<span v-if="expiresLabel">
            ({{ expiresLabel }})</span>.
        </p>
        <div class="sub-cancel-actions">
          <button
            class="sub-cancel-danger"
            type="button"
            :disabled="cancelLoading"
            @click="confirmCancel"
          >
            {{ cancelLoading ? 'Отменяем…' : 'Да, отменить' }}
          </button>
          <button
            class="sub-cancel-keep"
            type="button"
            :disabled="cancelLoading"
            @click="dismissCancel"
          >
            Оставить
          </button>
        </div>
        <p v-if="cancelError" class="sub-error">{{ cancelError }}</p>
      </div>
    </template>
  </template>
</div>
