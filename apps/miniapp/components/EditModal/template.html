<div
  class="modal-overlay"
  :style="overlayStyle"
  @click.self="emit('close')"
>
  <div class="modal">
    <div class="modal-header">
      <h3>Изменить запись</h3>
    </div>

    <div class="modal-body">
      <label>Описание</label>
      <input v-model="description" type="text" placeholder="Описание" />

      <label>Тип</label>
      <select v-model="type" class="select-styled">
        <option value="expense">Расход</option>
        <option value="income">Доход</option>
      </select>

      <label>Категория</label>
      <input v-model="category" type="text" placeholder="Категория" />

      <label>Сумма</label>
      <input
        v-model="amount"
        type="number"
        inputmode="decimal"
        step="0.01"
        min="0"
        placeholder="0"
      />

      <label>Валюта</label>
      <select v-model="currency" class="select-styled">
        <option v-for="c in CURRENCIES" :key="c" :value="c">{{ c }}</option>
      </select>

      <label>Дата</label>
      <input v-model="date" type="date" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-cancel" @click="emit('close')">
        Отмена
      </button>
      <button type="button" class="btn-save" @click="save">Сохранить</button>
    </div>
  </div>
</div>
