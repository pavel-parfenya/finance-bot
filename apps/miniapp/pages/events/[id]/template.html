<div>
  <div v-if="loading" class="loading">Загрузка...</div>
  <div v-else-if="error" class="error">{{ error }}</div>
  <template v-else-if="event">
    <!-- Шапка -->
    <div class="ev-head">
      <div class="ev-title">
        <h2 class="ev-name">{{ event.name }}</h2>
        <span v-if="event.status === 'settled'" class="event-badge">рассчитано</span>
      </div>
      <button type="button" class="btn-icon" @click="openEdit" title="Изменить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      </button>
    </div>
    <p v-if="event.description" class="ev-desc">{{ event.description }}</p>
    <p v-if="event.keywords" class="ev-keywords">🔑 {{ event.keywords }}</p>

    <!-- Табы -->
    <nav class="ev-tabs">
      <button
        type="button"
        :class="['ev-tab', { active: activeTab === 'members' }]"
        @click="activeTab = 'members'"
      >
        Участники
      </button>
      <button
        type="button"
        :class="['ev-tab', { active: activeTab === 'my' }]"
        @click="activeTab = 'my'"
      >
        Мои траты
      </button>
      <button
        type="button"
        :class="['ev-tab', { active: activeTab === 'all' }]"
        @click="activeTab = 'all'"
      >
        Все траты
      </button>
      <button
        v-if="hasSettlement"
        type="button"
        :class="['ev-tab', { active: activeTab === 'settlement' }]"
        @click="activeTab = 'settlement'"
      >
        Итог
      </button>
    </nav>

    <!-- Таб: Участники -->
    <div v-show="activeTab === 'members'" class="ev-pane">
      <div class="section-head">
        <h3 class="section-title">Участники</h3>
        <button
          v-if="isActive"
          type="button"
          class="btn-mini"
          @click="showInvite = true"
        >
          + Пригласить
        </button>
      </div>
      <div v-for="m in event.members" :key="m.userId" class="member-row">
        <div class="member-name">
          {{ m.displayName }}
          <span v-if="m.isCreator" class="member-tag">создатель</span>
          <span v-else-if="m.isMe" class="member-tag">вы</span>
        </div>
        <div class="member-total">{{ formatMoney(m.total, event.currency) }}</div>
        <button
          v-if="isCreator && !m.isCreator && isActive"
          type="button"
          class="btn-del"
          @click="kickMember(m.userId)"
        >
          ✕
        </button>
      </div>
    </div>

    <!-- Таб: Мои траты -->
    <div v-show="activeTab === 'my'" class="ev-pane">
      <div class="section-head">
        <h3 class="section-title">Мои траты</h3>
        <button v-if="isActive" type="button" class="btn-mini" @click="openLink">
          + Привязать
        </button>
      </div>
      <div v-if="event.myTransactions.length === 0" class="empty-sm">
        Пока нет ваших трат в этом событии.
      </div>
      <div
        v-for="t in event.myTransactions"
        :key="t.id"
        class="tx-card"
        :class="{ excluded: t.excludedFromEvent }"
      >
        <div class="tx-info">
          <div class="tx-desc">{{ t.description }}</div>
          <div class="tx-amount">
            {{ formatMoney(t.amount, t.currency) }}
            <span
              v-if="t.currency !== event.currency"
              class="tx-converted"
            >≈ {{ formatMoney(t.amountInEventCurrency, event.currency) }}</span>
          </div>
          <div v-if="t.excludedFromEvent" class="tx-flag">не в расчёте</div>
        </div>
        <div v-if="isActive" class="tx-actions">
          <button type="button" class="btn-mini ghost" @click="toggleExclude(t)">
            {{ t.excludedFromEvent ? 'В расчёт' : 'Исключить' }}
          </button>
          <button type="button" class="btn-del" @click="removeTx(t)">✕</button>
        </div>
      </div>
    </div>

    <!-- Таб: Все траты -->
    <div v-show="activeTab === 'all'" class="ev-pane">
      <h3 class="section-title">Все траты события</h3>
      <div v-if="event.allTransactions.length === 0" class="empty-sm">
        Пока нет трат.
      </div>
      <div
        v-for="t in event.allTransactions"
        :key="t.id"
        class="tx-card"
        :class="{ excluded: t.excludedFromEvent }"
      >
        <div class="tx-info">
          <div class="tx-desc">{{ t.description }}</div>
          <div class="tx-by">{{ t.displayName }}</div>
        </div>
        <div class="tx-info-right">
          <div class="tx-amount">{{ formatMoney(t.amountInEventCurrency, event.currency) }}</div>
          <div v-if="t.excludedFromEvent" class="tx-flag">не в расчёте</div>
        </div>
        <button
          v-if="isActive && (t.isMine || isCreator)"
          type="button"
          class="btn-mini ghost"
          @click="toggleExclude(t)"
        >
          {{ t.excludedFromEvent ? 'В расчёт' : 'Искл.' }}
        </button>
      </div>
    </div>

    <!-- Таб: Итог -->
    <div v-show="activeTab === 'settlement'" class="ev-pane">
      <h3 class="section-title">Итог события</h3>
      <template v-if="hasSettlement">
        <div v-for="(r, i) in event.settlement" :key="i" class="settle-row">
          <div class="settle-text">
            <b>{{ r.fromName }}</b> → <b>{{ r.toName }}</b>
            <div class="settle-amount">{{ formatMoney(r.amount, r.currency) }}</div>
          </div>
          <button
            v-if="r.fromUserId === myUserId"
            type="button"
            class="btn-mini"
            :disabled="busy || r.debtCreated"
            @click="makeDebt(r.toUserId)"
          >
            {{ r.debtCreated ? 'Долг создан' : 'Создать долг' }}
          </button>
        </div>
      </template>
      <div v-else-if="event.status === 'settled'" class="settle-empty">
        Все траты равны — переводы не нужны.
      </div>
    </div>

    <!-- Действия события -->
    <div class="ev-actions">
      <button
        v-if="isCreator && isActive"
        type="button"
        class="btn-primary"
        :disabled="busy"
        @click="doSettle"
      >
        Завершить и рассчитать
      </button>
      <button
        v-if="!isCreator"
        type="button"
        class="btn-secondary"
        @click="doLeave"
      >
        Выйти из события
      </button>
      <button
        v-if="isCreator"
        type="button"
        class="btn-danger"
        @click="removeEvent"
      >
        Удалить событие
      </button>
    </div>

    <!-- Модалка редактирования -->
    <div v-if="showEdit" class="modal-overlay" @click.self="showEdit = false">
      <div class="modal">
        <div class="modal-header">
          <h3>Изменить событие</h3>
          <button type="button" class="btn-close" @click="showEdit = false">✕</button>
        </div>
        <div class="edit-form">
          <label class="form-label">Название</label>
          <input v-model="editName" type="text" class="form-input" />
          <label class="form-label">Описание</label>
          <textarea v-model="editDescription" class="form-input form-textarea" rows="2"></textarea>
          <label class="form-label">Ключевые слова</label>
          <input v-model="editKeywords" type="text" class="form-input" />
          <button type="button" class="btn-submit" :disabled="busy" @click="saveInfo">
            Сохранить
          </button>
        </div>
      </div>
    </div>

    <!-- Модалка приглашения -->
    <div v-if="showInvite" class="modal-overlay" @click.self="showInvite = false">
      <div class="modal">
        <div class="modal-header">
          <h3>Пригласить участника</h3>
          <button type="button" class="btn-close" @click="showInvite = false">✕</button>
        </div>
        <div class="edit-form">
          <input
            v-model="inviteUsername"
            type="text"
            placeholder="@username"
            class="form-input"
            autocomplete="off"
          />
          <p class="hint">Пользователь должен сначала написать боту /start.</p>
          <button type="button" class="btn-submit" :disabled="busy" @click="doInvite">
            Отправить приглашение
          </button>
        </div>
      </div>
    </div>

    <!-- Модалка привязки траты -->
    <div v-if="showLink" class="modal-overlay" @click.self="showLink = false">
      <div class="modal">
        <div class="modal-header">
          <h3>Привязать трату</h3>
          <button type="button" class="btn-close" @click="showLink = false">✕</button>
        </div>
        <div class="link-list">
          <div v-if="linkLoading" class="empty-sm">Загрузка...</div>
          <div v-else-if="linkCandidates.length === 0" class="empty-sm">
            Нет доступных трат для привязки.
          </div>
          <div
            v-for="t in linkCandidates"
            :key="t.id"
            class="link-item"
            @click="doLink(t.id)"
          >
            <div class="tx-desc">{{ t.description }}</div>
            <div class="tx-amount">{{ formatMoney(t.amount, t.currency) }}</div>
          </div>
        </div>
      </div>
    </div>
  </template>
</div>
