# finance-bot.by — reverse proxy host-nginx на docker-сервисы (loopback-порты).
# SSL: Cloudflare Origin Certificate (cert.pem/key.pem), режим CF — Full (strict).
# Деплой: симлинк в /etc/nginx/sites-enabled/, серт в /etc/nginx/ssl/finance-bot.by/,
# сниппеты в /etc/nginx/snippets/ (см. deploy/README.md).
#
# Соответствие поддоменов и контейнеров (порты публикуются на 127.0.0.1):
#   finance-bot.by, www  -> landing  127.0.0.1:3001
#   api.finance-bot.by   -> api       127.0.0.1:10000
#   bot.finance-bot.by   -> bot       127.0.0.1:10001
#   cms.finance-bot.by   -> Strapi    127.0.0.1:1337
#   app.finance-bot.by   -> miniapp   127.0.0.1:3000  (Telegram Mini App, /app)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS для всех хостов.
server {
    listen 80;
    listen [::]:80;
    server_name finance-bot.by www.finance-bot.by api.finance-bot.by bot.finance-bot.by cms.finance-bot.by app.finance-bot.by;
    return 301 https://$host$request_uri;
}

# --- Лендинг (apex + www) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name finance-bot.by www.finance-bot.by;

    ssl_certificate     /etc/nginx/ssl/finance-bot.by/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/finance-bot.by/key.pem;
    include /etc/nginx/snippets/cloudflare-realip.conf;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        include /etc/nginx/snippets/proxy_params_fb.conf;
    }
}

# --- API (NestJS) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.finance-bot.by;

    ssl_certificate     /etc/nginx/ssl/finance-bot.by/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/finance-bot.by/key.pem;
    include /etc/nginx/snippets/cloudflare-realip.conf;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:10000;
        include /etc/nginx/snippets/proxy_params_fb.conf;
    }
}

# --- Bot (grammY HTTP: health, webhook, internal) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bot.finance-bot.by;

    ssl_certificate     /etc/nginx/ssl/finance-bot.by/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/finance-bot.by/key.pem;
    include /etc/nginx/snippets/cloudflare-realip.conf;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:10001;
        include /etc/nginx/snippets/proxy_params_fb.conf;
    }
}

# --- CMS (Strapi) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cms.finance-bot.by;

    ssl_certificate     /etc/nginx/ssl/finance-bot.by/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/finance-bot.by/key.pem;
    include /etc/nginx/snippets/cloudflare-realip.conf;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:1337;
        include /etc/nginx/snippets/proxy_params_fb.conf;
    }
}

# --- Mini App (статика Nuxt, miniapp-контейнер) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.finance-bot.by;

    ssl_certificate     /etc/nginx/ssl/finance-bot.by/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/finance-bot.by/key.pem;
    include /etc/nginx/snippets/cloudflare-realip.conf;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy_params_fb.conf;
    }
}
